<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Tạo Bookmarklet Netflix v2.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #141414; color: #fff; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #e50914; }
        textarea { width: 100%; max-width: 800px; padding: 15px; border-radius: 8px; border: 1px solid #333; background-color: #222; color: #0f0; font-family: monospace; resize: vertical; margin-bottom: 15px; }
        button { background-color: #e50914; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #f40612; }
        .result-box { margin-top: 20px; width: 100%; max-width: 800px; }
        #resultOutput { background-color: #1a1a1a; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🔥 TRÌNH TẠO JAVASCRIPT NẠP COOKIE NETFLIX (v2.0) 🔥</h2>
    
    <p>Dán Cookie vào đây (Hỗ trợ: JSON, Chuỗi Netscape, Chuỗi Text F12):</p>
    <textarea id="cookieInput" rows="10" placeholder='Dán Cookie lộn xộn vào đây...'></textarea>
    
    <button onclick="convertCookie()">Tạo Mã JavaScript</button>

    <div class="result-box">
        <p><strong>Kết quả (Copy toàn bộ khung dưới đây):</strong></p>
        <textarea id="resultOutput" rows="5" readonly placeholder="Mã JavaScript sẽ xuất hiện ở đây..."></textarea>
    </div>

    <script>
        function convertCookie() {
            let input = document.getElementById("cookieInput").value.trim();
            let netflixId = "";
            let secureNetflixId = "";

            if (!input) {
                alert("Vui lòng dán Cookie vào trước!");
                return;
            }

            // 1. Thử giải mã JSON
            try {
                let data = JSON.parse(input);
                data.forEach(item => {
                    if (item.name === "NetflixId") netflixId = item.value;
                    if (item.name === "SecureNetflixId") secureNetflixId = item.value;
                });
            } catch (e) {
                // 2. Nếu không phải JSON, thử định dạng cột Tab (Netscape)
                let lines = input.split('\n');
                for (let line of lines) {
                    let parts = line.split('\t');
                    // Định dạng Netscape thường có 7 cột, cột 5 là Tên, cột 6 là Giá trị
                    if (parts.length >= 7) {
                        let name = parts[5].trim();
                        let value = parts[6].trim();
                        if (name === "NetflixId") netflixId = value;
                        if (name === "SecureNetflixId") secureNetflixId = value;
                    }
                }

                // 3. Nếu vẫn không có, thử dạng chuỗi Text thô (Name=Value;)
                if (!netflixId || !secureNetflixId) {
                    let matchNid = input.match(/NetflixId=([^;\s]+)/);
                    let matchSnid = input.match(/SecureNetflixId=([^;\s]+)/);
                    if (matchNid) netflixId = matchNid[1].trim();
                    if (matchSnid) secureNetflixId = matchSnid[1].trim();
                }
            }

            let outputBox = document.getElementById("resultOutput");

            if (netflixId && secureNetflixId) {
                let jsCode = `javascript:document.cookie="NetflixId=${netflixId};domain=.netflix.com;path=/;secure";document.cookie="SecureNetflixId=${secureNetflixId};domain=.netflix.com;path=/;secure";alert("Nạp Cookie Thành Công! Hãy Tải lại trang (F5).");`;
                outputBox.value = jsCode;
            } else {
                outputBox.value = "❌ LỖI: Không tìm thấy 'NetflixId' hoặc 'SecureNetflixId'. Hãy chắc chắn bạn copy đủ dữ liệu!";
            }
        }
    </script>

</body>
</html>
