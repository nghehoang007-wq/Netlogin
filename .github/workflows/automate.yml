name: Manual Convert Cookie

on:
  push:
    paths:
      - 'input_cookies/**' # Tự động chạy khi bác upload file mới
  workflow_dispatch:      # Nút bấm chạy thủ công trong tab Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Universal Cookie Converter
        shell: python
        run: |
          import os, re, json
          
          input_folder = 'input_cookies'
          output_file = 'script.js'
          cookie_pool = []
          
          if os.path.exists(input_folder):
              for filename in os.listdir(input_folder):
                  filepath = os.path.join(input_folder, filename)
                  if os.path.isfile(filepath):
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()
                          
                          # Regex siêu cấp: Lọc sạch mã NetflixId và SecureNetflixId
                          # Chỉ lấy chuỗi có độ dài > 20 để tránh lấy nhầm rác
                          n_match = re.search(r'NetflixId["\s=|\t]+((?:ct|v%3D)[^\s"|;]{20,})', content)
                          s_match = re.search(r'SecureNetflixId["\s=|\t]+(v%3D3%26mac%3D[^\s"|;]{20,})', content)
                          
                          if n_match and s_match:
                              n_val = n_match.group(1).strip()
                              s_val = s_match.group(1).strip()
                              
                              # Kiểm tra điều kiện: n và s phải khác nhau (tránh lấy trùng mã mac)
                              if n_val != s_val:
                                  cookie_pool.append({"n": n_val, "s": s_val})
                                  print(f"✅ Đã thêm acc từ: {filename}")

          if not cookie_pool:
              print("❌ Lỗi: Không tìm thấy tài khoản nào hợp lệ trong folder input_cookies!")
              exit(1)

          # Tạo mã JavaScript hoàn chỉnh cho iOS Shortcuts
          js_code = f"""
const pool = {json.dumps(cookie_pool)};
const pick = pool[Math.floor(Math.random() * pool.length)];

// Bơm Cookie
document.cookie = "NetflixId=" + pick.n + ";domain=.netflix.com;path=/;secure";
document.cookie = "SecureNetflixId=" + pick.s + ";domain=.netflix.com;path=/;secure";

alert("Nạp acc thành công! Hệ thống đang có: {len(cookie_pool)} acc.");

// Sửa lỗi Safari: Gọi completion trước khi reload
if (typeof completion === "function") {{
    completion();
}}

// Reload trang để áp dụng cookie
window.location.reload();
"""
          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(js_code)
          print(f"🚀 Thành công: Đã tạo file script.js với {len(cookie_pool)} acc.")

      - name: Push Result to GitHub
        run: |
          git config --global user.name "Netflix-Bot"
          git config --global user.email "bot@github.com"
          git add script.js
          git commit -m "🚀 Auto Update Cookies [$(date)]" || exit 0
          git push
