name: Manual Convert Cookie

on:
  push:
    paths:
      - 'input_cookies/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Chạy Logic Chuyển Đổi (Universal Regex)
        shell: python
        run: |
          import os, re, json
          
          input_folder = 'input_cookies'
          output_file = 'script.js'
          cookie_pool = []
          
          if os.path.exists(input_folder):
              for filename in os.listdir(input_folder):
                  filepath = os.path.join(input_folder, filename)
                  if os.path.isfile(filepath):
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()
                          
                          # Regex siêu linh hoạt: Bỏ qua dấu bằng, dấu cách hay dấu Tab
                          # Nó sẽ tìm chữ NetflixId và hốt đoạn mã phía sau
                          n_id = re.search(r'NetflixId["\s=|\t]+([^\s"|;]+)', content)
                          s_id = re.search(r'SecureNetflixId["\s=|\t]+([^\s"|;]+)', content)
                          
                          if n_id and s_id:
                              cookie_pool.append({"n": n_id.group(1).strip(), "s": s_id.group(1).strip()})
                              print(f"✅ Đã hốt được: {filename}")
                          else:
                              print(f"⚠️ Không tìm thấy mã trong: {filename}")
          
          # Nếu không tìm thấy gì, tạo file rỗng để không lỗi
          if not cookie_pool:
              print("❌ Toang rồi! Không tìm thấy acc nào cả.")
              exit(1)

          js_code = f"""
          const pool = {json.dumps(cookie_pool)};
          const pick = pool[Math.floor(Math.random() * pool.length)];
          document.cookie = "NetflixId=" + pick.n + ";domain=.netflix.com;path=/;secure";
          document.cookie = "SecureNetflixId=" + pick.s + ";domain=.netflix.com;path=/;secure";
          alert("Nạp acc thành công! Kho đang có: {len(cookie_pool)} acc.");
          window.location.reload();
          completion();
          """
          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(js_code)
          print(f"🚀 Tổng cộng xử lý xong {len(cookie_pool)} acc.")

      - name: Lưu kết quả lên GitHub
        run: |
          git config --global user.name "Netflix-Bot"
          git config --global user.email "bot@github.com"
          git add script.js
          git commit -m "🚀 Update script.js [$(date)]" || exit 0
          git push
