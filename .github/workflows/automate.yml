import os, re, json
          
          input_folder = 'input_cookies'
          output_file = 'script.js'
          cookie_pool = []
          
          if os.path.exists(input_folder):
              for filename in os.listdir(input_folder):
                  filepath = os.path.join(input_folder, filename)
                  if os.path.isfile(filepath):
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()
                          
                          # Tìm NetflixId (thường bắt đầu bằng ct%3D hoặc v%3D)
                          n_id = re.search(r'NetflixId["\s=|\t]+((?:ct|v%3D)[^\s"|;]+)', content)
                          # Tìm SecureNetflixId (phải chứa mã mac%3D)
                          s_id = re.search(r'SecureNetflixId["\s=|\t]+(v%3D3%26mac%3D[^\s"|;]+)', content)
                          
                          if n_id and s_id:
                              n_val = n_id.group(1).strip()
                              s_val = s_id.group(1).strip()
                              # Chỉ lấy nếu hai mã này khác nhau và không phải dấu phẩy
                              if n_val != s_val and len(n_val) > 10:
                                  cookie_pool.append({"n": n_val, "s": s_val})
                                  print(f"✅ Hốt acc ngon: {filename}")
          
          if not cookie_pool:
              print("❌ Không có acc nào đạt chuẩn!")
              exit(1)

          js_code = f"""
const pool = {json.dumps(cookie_pool)};
const pick = pool[Math.floor(Math.random() * pool.length)];
document.cookie = "NetflixId=" + pick.n + ";domain=.netflix.com;path=/;secure";
document.cookie = "SecureNetflixId=" + pick.s + ";domain=.netflix.com;path=/;secure";
alert("Nạp acc thành công! Kho đang có: {len(cookie_pool)} acc sống.");
window.location.reload();
completion();"""
          with open(output_file, 'w', encoding='utf-8') as f:
              f.write(js_code)
